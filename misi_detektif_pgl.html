            scoreState.misi7_y2 = y2;

            const processEl = document.getElementById('misi7_calc_process');
            const resultEl = document.getElementById('misi7_calc_result');

            if (x2 - x1 === 0) {
                processEl.innerText = `m = ( ${y2} - ${y1} ) / ( ${x2} - ${x1} )`;
                resultEl.innerHTML = `<span class="text-red-400">Gradien Tidak Terdefinisi (Garis Vertikal Sempurna!)</span>`;
                return;
            }

            const dy = y2 - y1;
            const dx = x2 - x1;
            const mVal = dy / dx;

            processEl.innerText = `m = ( ${y2} - ${y1} ) / ( ${x2} - ${x1} )  =>  m = ${dy} / ${dx}`;
            resultEl.innerHTML = `Gradien Akhir: m = <span class="text-emerald-400 underline font-extrabold">${mVal.toFixed(2)}</span>`;

        // Level 10: Form Transfomer Logic
        function updateMisi11Calc() {

            let byTerm = b !== 0 ? (b > 0 ? ` + ${b}y` : ` - ${Math.abs(b)}y`) : '';
            let cTerm = c !== 0 ? (c > 0 ? ` + ${c}` : ` - ${Math.abs(c)}`) : '';
            
            let implicitStr = `${axTerm}${byTerm}${cTerm} = 0`;
            equationDisplay.innerText = `Bentuk Implisit: ${implicitStr}`;

            if (b === 0) {
                stepsDisplay.innerHTML = `<p class="text-red-400">Perhatian: B bernilai 0. Garis vertikal tidak dapat ditransformasi ke bentuk eksplisit y = mx + c.</p>`;

        // Simulator Logic update
        function updateSimulator() {
            const m = parseFloat(document.getElementById('slider-m').value);
            const c = parseFloat(document.getElementById('slider-c').value);
            
            scoreState.simulatorM = m;
            scoreState.simulatorC = c;

            document.getElementById('slider-m-val').innerText = m;
            document.getElementById('slider-c-val').innerText = c;
            document.getElementById('simulator-equation').innerText = `y = ${m}x ${c >= 0 ? '+ ' + c : '- ' + Math.abs(c)}`;

            drawGraph(m, c);
        }

        function drawGraph(m, c) {
            if (!ctx) return;
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const w = canvas.width;
            const h = canvas.height;
            const originX = w / 2;
            const originY = h / 2;
            const scale = 2; // Pixel per Unit

            // Grid Lines
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 0.5;
            for (let i = 10; i < w; i += 15) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, h);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(w, i);
                ctx.stroke();
            }

            // X and Y Axes
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(originX, 0); ctx.lineTo(originX, h); // Y
            ctx.moveTo(0, originY); ctx.lineTo(w, originY); // X
            ctx.stroke();

            // Draw line formula y = m*x + c
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 3.5;
            ctx.beginPath();
            
            const startX_unit = -50;
            const startY_unit = m * startX_unit + c;
            const endX_unit = 50;
            const endY_unit = m * endX_unit + c;

            const cStartX = originX + startX_unit * scale;
            const cStartY = originY - startY_unit * scale;
            const cEndX = originX + endX_unit * scale;
            const cEndY = originY - endY_unit * scale;

            ctx.moveTo(cStartX, cStartY);
            ctx.lineTo(cEndX, cEndY);
            ctx.stroke();

            // Dot Intersection with Sumbu Y
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(originX, originY - c * scale, 5, 0, 2 * Math.PI);
            ctx.fill();
        }
