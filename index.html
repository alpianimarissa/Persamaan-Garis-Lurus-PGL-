<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Interaktif Persamaan Garis Lurus</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Poppins & Lato -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2 family=Lato:wght@400;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Lato', sans-serif;
        }
        .font-poppins {
            font-family: 'Poppins', sans-serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <!-- CONTAINER UTAMA -->
    <div class="max-w-7xl mx-auto px-4 py-6 md:py-10">
        
        <!-- HEADER DASHBOARD -->
        <header class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-xl shadow-md shadow-indigo-100">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold font-poppins text-slate-900">Evaluasi Mandiri</h1>
                    <p class="text-xs md:text-sm text-slate-500 font-medium font-poppins">Persamaan Garis Lurus (PGL) — Kelas VIII</p>
                </div>
            </div>

            <!-- Total Score Badge -->
            <div class="bg-indigo-50 border border-indigo-100 px-4 py-2 rounded-xl flex items-center gap-2">
                <i class="fa-solid fa-star text-amber-500"></i>
                <span class="text-sm font-bold font-poppins text-indigo-900" id="global-badge-score">Skor: 0 / 10</span>
            </div>
        </header>

        <!-- MAIN LAYOUT (KIRI: SOAL & KANAN: PANEL NAVIGASI) -->
        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- SEBELAH KIRI: KARTU SOAL & OPSI JAWABAN -->
            <div class="lg:col-span-2 flex flex-col gap-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8 relative overflow-hidden transition-all duration-300 min-h-[400px] flex flex-col justify-between">
                    
                    <div>
                        <!-- Info Bar Atas Soal -->
                        <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
                            <div>
                                <span class="text-xs font-bold text-indigo-600 tracking-wider uppercase font-poppins" id="info-nomor-soal">SOAL 1 DARI 10</span>
                                <span class="ml-3 px-2.5 py-0.5 bg-indigo-50 text-indigo-700 text-[10px] font-bold rounded-full font-poppins">TIPE MANDIRI</span>
                            </div>
                            <span class="text-xs font-semibold text-slate-400 bg-slate-50 px-3 py-1 rounded-full flex items-center gap-1 font-poppins">
                                <i class="fa-solid fa-tag text-slate-300"></i> Topik: <span id="info-topik">Gradien & Garis</span>
                            </span>
                        </div>

                        <!-- Pertanyaan Utama -->
                        <h2 class="text-base md:text-lg font-bold font-poppins text-slate-900 leading-relaxed mb-6" id="teks-pertanyaan">
                            Memuat pertanyaan...
                        </h2>

                        <!-- Opsi Jawaban (Pilihan Ganda) -->
                        <div class="grid grid-cols-1 gap-3.5 mb-8" id="container-opsi">
                            <!-- Dinamis disisipkan via JS -->
                        </div>
                    </div>

                    <!-- Tombol Aksi Bawah -->
                    <div class="flex items-center justify-between border-t border-slate-100 pt-6 mt-4">
                        <button onclick="lewatiSoal()" id="btn-lewati" class="px-5 py-2.5 text-sm font-semibold text-slate-500 hover:text-slate-800 transition-colors duration-200 font-poppins">
                            Lewati Soal
                        </button>
                        <button onclick="periksaJawaban()" id="btn-periksa" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold font-poppins rounded-xl transition-all duration-200 shadow-md shadow-indigo-100 flex items-center gap-2">
                            Periksa Jawaban <i class="fa-solid fa-circle-check"></i>
                        </button>
                    </div>

                </div>

                <!-- BOX PENJELASAN (AKAN MUNCUL SETELAH CLICK PERIKSA JAWABAN) -->
                <div id="box-pembahasan" class="hidden bg-emerald-50 border border-emerald-200 rounded-2xl p-6 md:p-8 shadow-sm transition-all duration-300">
                    <div class="flex items-start gap-4">
                        <div id="pembahasan-icon" class="w-10 h-10 rounded-xl flex items-center justify-center text-white text-lg shrink-0">
                            <i class="fa-solid fa-circle-info"></i>
                        </div>
                        <div class="flex-1">
                            <h3 id="pembahasan-judul" class="text-base font-bold font-poppins text-slate-900 mb-2">Langkah Penyelesaian</h3>
                            <div id="pembahasan-teks" class="text-sm md:text-base text-slate-600 space-y-4 leading-relaxed font-poppins">
                                <!-- Penjelasan super jelas disisipkan disini -->
                            </div>
                            <div class="mt-6 flex justify-end">
                                <button onclick="nextSoal()" class="px-5 py-2.5 bg-slate-900 hover:bg-slate-800 text-white text-sm font-bold rounded-xl flex items-center gap-2 transition-colors duration-200 shadow font-poppins">
                                    Lanjut ke Soal Berikutnya <i class="fa-solid fa-arrow-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- SEBELAH KANAN: PANEL NAVIGASI ANGKA (PERSIS SCREENSHOT) -->
            <div class="flex flex-col gap-6">
                
                <!-- Navigasi Panel Card -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                    <h3 class="text-base font-bold font-poppins text-slate-900 mb-5 pb-3 border-b border-slate-100 flex items-center gap-2">
                        <i class="fa-solid fa-compass text-indigo-500"></i> Navigasi Soal
                    </h3>
                    
                    <!-- Grid Angka 1-10 -->
                    <div class="grid grid-cols-5 gap-3 mb-6" id="grid-navigasi">
                        <!-- Dinamis tombol 1 - 10 disisipkan via JS -->
                    </div>

                    <!-- Indikator Keterangan Warna -->
                    <div class="border-t border-slate-100 pt-5 space-y-3">
                        <div class="flex items-center justify-between text-xs text-slate-500 font-poppins">
                            <span class="flex items-center gap-2"><span class="w-3.5 h-3.5 bg-indigo-600 rounded-md border border-indigo-200"></span> Sedang Aktif</span>
                            <span class="flex items-center gap-2"><span class="w-3.5 h-3.5 bg-emerald-500 rounded-md"></span> Benar</span>
                        </div>
                        <div class="flex items-center justify-between text-xs text-slate-500 font-poppins">
                            <span class="flex items-center gap-2"><span class="w-3.5 h-3.5 bg-rose-500 rounded-md"></span> Salah</span>
                            <span class="flex items-center gap-2"><span class="w-3.5 h-3.5 bg-slate-100 rounded-md border border-slate-200"></span> Belum Selesai</span>
                        </div>
                    </div>
                </div>

                <!-- Live Score Card -->
                <div class="bg-gradient-to-br from-indigo-950 to-slate-900 rounded-2xl text-white p-6 shadow-xl relative overflow-hidden">
                    <div class="absolute -right-10 -bottom-10 opacity-10 text-[140px] font-bold select-none pointer-events-none font-poppins">
                        =
                    </div>
                    <h3 class="text-sm font-semibold text-indigo-200 font-poppins uppercase tracking-wider mb-4">Kemajuan Latihan</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/10 p-4 rounded-xl backdrop-blur-sm">
                            <span class="text-xs text-indigo-200 block mb-1">Kemajuan Kuis</span>
                            <span class="text-2xl font-bold font-poppins" id="score-progres">0/10</span>
                            <span class="text-[10px] text-slate-300 block mt-1">soal selesai</span>
                        </div>
                        <div class="bg-white/10 p-4 rounded-xl backdrop-blur-sm">
                            <span class="text-xs text-indigo-200 block mb-1">Jawaban Benar</span>
                            <span class="text-2xl font-bold font-poppins text-emerald-400" id="score-benar">0</span>
                            <span class="text-[10px] text-slate-300 block mt-1 font-poppins">benar</span>
                        </div>
                    </div>
                </div>

            </div>

        </main>

    </div>

    <!-- DATASET 10 SOAL MANDIRI DAN PENJELASAN UNICODE -->
    <script>
        const questionsData = [
            {
                number: 1,
                topic: "Menentukan Gradien",
                question: "Tentukan gradien garis yang melalui titik (2, 5) dan (4, 9).",
                options: [
                    { id: 'A', text: "m = 1" },
                    { id: 'B', text: "m = 2" },
                    { id: 'C', text: "m = 3" },
                    { id: 'D', text: "m = 4" }
                ],
                correct: 'B',
                explanation: `
                <div class="space-y-4">
                    <p class="font-semibold text-slate-800">Mari pelajari cara menghitung gradien dua titik secara perlahan! ✨</p>
                    <div class="p-4 bg-white rounded-xl border border-slate-100 shadow-sm space-y-2">
                        <p class="text-sm font-semibold text-indigo-600"><i class="fa-solid fa-lightbulb"></i> Rumus Gradien (m):</p>
                        <p class="text-xs text-slate-600 font-bold">m = (y₂ − y₁) / (x₂ − x₁)</p>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-sm"><strong>Tentukan nilai koordinat:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">Titik kesatu (x₁, y₁) = (2, 5)<br>Titik kedua (x₂, y₂) = (4, 9)</p>
                        
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-sm"><strong>Masukkan angka ke dalam rumus:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            m = (9 − 5) / (4 − 2)<br>
                            m = 4 / 2 = <strong>2</strong> (Jawaban B)
                        </p>
                    </div>
                </div>`
            },
            {
                number: 2,
                topic: "Menentukan Persamaan Garis",
                question: "Tentukan persamaan garis yang memiliki gradien 4 dan melalui titik (0, −3).",
                options: [
                    { id: 'A', text: "y = 4x + 3" },
                    { id: 'B', text: "y = 4x − 3" },
                    { id: 'C', text: "y = −3x + 4" },
                    { id: 'D', text: "y = −3x − 4" }
                ],
                correct: 'B',
                explanation: `
                <div class="space-y-4">
                    <p class="font-semibold text-slate-800">Menyusun Persamaan Garis y = mx + c: 💡</p>
                    <div class="space-y-3">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-sm"><strong>Pahami unsur yang diketahui:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            Gradien (m) = 4 <br>
                            Titik potong sumbu-Y di (0, −3) yang berarti nilai konstanta (c) = −3.
                        </p>
                        
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-sm"><strong>Masukkan langsung ke rumus umum:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600 font-bold text-indigo-800">
                            y = mx + c <br>
                            y = 4x − 3 (Jawaban B)
                        </p>
                    </div>
                </div>`
            },
            {
                number: 3,
                topic: "Mengubah Bentuk Persamaan",
                question: "Ubahlah persamaan 3x + y = 6 ke dalam bentuk y = mx + c.",
                options: [
                    { id: 'A', text: "y = 3x + 6" },
                    { id: 'B', text: "y = −3x + 6" },
                    { id: 'C', text: "y = −3x − 6" },
                    { id: 'D', text: "y = 3x − 6" }
                ],
                correct: 'B',
                explanation: `
                <div class="space-y-4">
                    <p class="font-semibold text-slate-800">Langkah mudah memindahkan suku (Aljabar): ⚙️</p>
                    <div class="space-y-3">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-sm"><strong>Posisikan variabel y sendirian di sisi kiri:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            Persamaan asal: 3x + y = 6
                        </p>
                        
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-sm"><strong>Pindahkan suku 3x ke sisi kanan:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            Saat pindah ruas melewati tanda sama dengan (=), nilai positif 3x berubah tanda menjadi negatif (−3x).<br>
                            Sehingga didapatkan bentuk: <strong>y = −3x + 6</strong> (Jawaban B)
                        </p>
                    </div>
                </div>`
            },
            {
                number: 4,
                topic: "Bentuk Garis Istimewa",
                question: "Sebuah garis melalui titik (1, 2) dan (3, 2). Berapakah gradiennya dan apa bentuk garis tersebut?",
                options: [
                    { id: 'A', text: "m = 0, garis horizontal" },
                    { id: 'B', text: "m = tidak terdefinisi, garis vertikal" },
                    { id: 'C', text: "m = 1, garis miring ke kanan" },
                    { id: 'D', text: "m = 2, garis miring ke atas" }
                ],
                correct: 'A',
                explanation: `
                <div class="space-y-4">
                    <p class="font-semibold text-slate-800">Memahami bentuk garis mendatar (horizontal): 📊</p>
                    <div class="space-y-3">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-sm"><strong>Hitung gradiennya terlebih dahulu:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            Titik: (1, 2) dan (3, 2)<br>
                            m = (2 − 2) / (3 − 1)<br>
                            m = 0 / 2 = <strong>0</strong>
                        </p>
                        
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-sm"><strong>Arti dari gradien bernilai nol (0):</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            Karena nilai y di kedua titik sama-sama 2, garis ini sejajar dengan sumbu x. <br>
                            Bentuk garis ini adalah <strong>horizontal (datar)</strong> dengan persamaan y = 2. (Jawaban A)
                        </p>
                    </div>
                </div>`
            },
            {
                number: 5,
                topic: "Menghitung PGL Lengkap",
                question: "Tentukan persamaan garis yang melalui titik (−2, 4) dan (1, 10).",
                options: [
                    { id: 'A', text: "y = 2x + 4" },
                    { id: 'B', text: "y = 2x + 6" },
                    { id: 'C', text: "y = 2x + 8" },
                    { id: 'D', text: "y = 3x + 10" }
                ],
                correct: 'C',
                explanation: `
                <div class="space-y-4">
                    <p class="font-semibold text-slate-800">Langkah runtut pengerjaan dua titik: 🛠️</p>
                    <div class="space-y-3">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-sm"><strong>Hitung gradien (m):</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            m = (10 − 4) / (1 − (−2))<br>
                            m = 6 / (1 + 2) = 6 / 3 = <strong>2</strong>
                        </p>

                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-sm"><strong>Gunakan rumus satu titik dan gradien:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            Gunakan titik (1, 10) dengan m = 2:<br>
                            y − y₁ = m(x − x₁)<br>
                            y − 10 = 2(x − 1)<br>
                            y − 10 = 2x − 2<br>
                            y = 2x − 2 + 10<br>
                            <strong>y = 2x + 8</strong> (Jawaban C)
                        </p>
                    </div>
                </div>`
            },
            {
                number: 6,
                topic: "Mencari Koefisien Garis",
                question: "Jika sebuah garis y = ax + 5 melalui titik (2, 11), hitunglah nilai a.",
                options: [
                    { id: 'A', text: "a = 2" },
                    { id: 'B', text: "a = 3" },
                    { id: 'C', text: "a = 4" },
                    { id: 'D', text: "a = 5" }
                ],
                correct: 'B',
                explanation: `
                <div class="space-y-4">
                    <p class="font-semibold text-slate-800">Gunakan metode substitusi koordinat! 🎯</p>
                    <div class="space-y-3">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-sm"><strong>Substitusi x = 2 dan y = 11 ke persamaan:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            y = ax + 5<br>
                            11 = a(2) + 5
                        </p>

                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-sm"><strong>Pecahkan nilai a:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            11 − 5 = 2a<br>
                            6 = 2a<br>
                            a = 6 / 2 = <strong>3</strong> (Jawaban B)
                        </p>
                    </div>
                </div>`
            },
            {
                number: 7,
                topic: "Garis Saling Sejajar",
                question: "Garis k melalui titik (3, −1) dan sejajar dengan garis y = 2x + 5. Tentukan persamaan garis k.",
                options: [
                    { id: 'A', text: "y = 2x + 7" },
                    { id: 'B', text: "y = 2x − 7" },
                    { id: 'C', text: "y = −2x + 7" },
                    { id: 'D', text: "y = 2x − 5" }
                ],
                correct: 'B',
                explanation: `
                <div class="space-y-4">
                    <p class="font-semibold text-slate-800">Menghubungkan sifat garis sejajar: 🗺️</p>
                    <div class="space-y-3">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-sm"><strong>Ketahui gradien garis sejajar:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            Garis y = 2x + 5 memiliki gradien m₁ = 2.<br>
                            Karena garis k sejajar, maka gradien garis k (m₂) juga bernilai sama, yaitu <strong>2</strong>.
                        </p>

                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-sm"><strong>Gunakan titik (3, −1):</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            y − y₁ = m(x − x₁)<br>
                            y − (−1) = 2(x − 3)<br>
                            y + 1 = 2x − 6<br>
                            y = 2x − 6 − 1<br>
                            <strong>y = 2x − 7</strong> (Jawaban B)
                        </p>
                    </div>
                </div>`
            },
            {
                number: 8,
                topic: "Titik Potong Sumbu X",
                question: "Tentukan koordinat titik potong terhadap sumbu-X dari persamaan garis 2y = 4x − 8.",
                options: [
                    { id: 'A', text: "(2, 0)" },
                    { id: 'B', text: "(0, 2)" },
                    { id: 'C', text: "(-2, 0)" },
                    { id: 'D', text: "(0, -4)" }
                ],
                correct: 'A',
                explanation: `
                <div class="space-y-4">
                    <p class="font-semibold text-slate-800">Cara mencari titik potong sumbu-X: 📍</p>
                    <div class="space-y-3">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-sm"><strong>Atur nilai y = 0:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            Syarat titik potong sumbu-X adalah saat grafik berada tepat di ketinggian y = 0.
                        </p>

                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-sm"><strong>Selesaikan aljabar x:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            2y = 4x − 8<br>
                            2(0) = 4x − 8<br>
                            0 = 4x − 8<br>
                            4x = 8 &rarr; x = 8 / 4 = <strong>2</strong><br>
                            Koordinatnya adalah <strong>(2, 0)</strong>. (Jawaban A)
                        </p>
                    </div>
                </div>`
            },
            {
                number: 9,
                topic: "Aplikasi Kontekstual PGL",
                question: "Sebuah tangki air berisi 10 liter air dan diisi terus menerus sehingga bertambah 2 liter setiap menit. Tuliskan persamaan garis yang menggambarkan volume air (y) terhadap waktu pengisian (x).",
                options: [
                    { id: 'A', text: "y = 10x + 2" },
                    { id: 'B', text: "y = 2x + 10" },
                    { id: 'C', text: "y = 2x − 10" },
                    { id: 'D', text: "y = 12x" }
                ],
                correct: 'B',
                explanation: `
                <div class="space-y-4">
                    <p class="font-semibold text-slate-800">Menyusun persamaan dari kondisi nyata: 💧</p>
                    <div class="space-y-3">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-sm"><strong>Tentukan komponen awal dan laju perubahan:</strong></p>
                        </div>
                        <ul class="text-xs pl-7 list-disc space-y-1 text-slate-600">
                            <li>Isi awal (saat x = 0) = 10 liter &rarr; Ini adalah konstanta (c) = 10</li>
                            <li>Laju pertambahan per menit = 2 liter &rarr; Ini adalah gradien (m) = 2</li>
                        </ul>

                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-sm"><strong>Susun Persamaan:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600 font-bold">
                            y = mx + c <br>
                            y = 2x + 10 (Jawaban B)
                        </p>
                    </div>
                </div>`
            },
            {
                number: 10,
                topic: "Verifikasi Keanggotaan Titik",
                question: "Apakah titik (5, 12) terletak pada garis yang menghubungkan titik (0, 2) dan (2, 6)? Buktikan dengan perhitungan.",
                options: [
                    { id: 'A', text: "Ya, karena titik (5, 12) memenuhi persamaan garis y = 2x + 2" },
                    { id: 'B', text: "Tidak, karena titik (5, 12) berada di luar grafik y = 2x + 2" },
                    { id: 'C', text: "Ya, karena persamaan garisnya adalah y = 3x − 3" },
                    { id: 'D', text: "Tidak, karena titik (5, 12) hanya dilewati oleh garis y = x + 7" }
                ],
                correct: 'A',
                explanation: `
                <div class="space-y-4">
                    <p class="font-semibold text-slate-800">Cara membuktikan keanggotaan koordinat: 🕵️‍♀️</p>
                    <div class="space-y-3">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">1</span>
                            <p class="text-sm"><strong>Cari persamaan garis pembentuk dari dua titik (0, 2) dan (2, 6):</strong></p>
                        </div>
                        <ul class="text-xs pl-7 list-disc space-y-1 text-slate-600">
                            <li>Gradien m = (6 − 2) / (2 − 0) = 4 / 2 = 2</li>
                            <li>Melalui titik (0, 2) yang berarti konstanta c = 2</li>
                            <li>Persamaan garis: <strong>y = 2x + 2</strong></li>
                        </ul>

                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-bold">2</span>
                            <p class="text-sm"><strong>Uji titik (5, 12) ke dalam persamaan tersebut:</strong></p>
                        </div>
                        <p class="text-xs pl-7 bg-slate-50 p-2 rounded-lg text-slate-600">
                            y = 2x + 2 <br>
                            12 = 2(5) + 2 <br>
                            12 = 10 + 2 &rarr; <strong>12 = 12 (Benar!)</strong>
                        </p>
                        <p class="text-xs pl-7 text-emerald-600 font-bold">
                            Kesimpulan: Ya, karena titik tersebut memenuhi persamaan garis yang sama. (Jawaban A)
                        </p>
                    </div>
                </div>`
            }
        ];

        // State Manajemen Aplikasi Kuis
        let currentIdx = 0;
        let selectedOption = null;
        let userAnswers = Array(10).fill(null); // Menyimpan status: null (belum), 'correct' (benar), 'incorrect' (salah)
        let selectedAnswers = Array(10).fill(null); // Menyimpan ID jawaban terpilih pengguna ('A', 'B', 'C', 'D')

        // Inisialisasi Kuis Saat Load
        window.onload = function() {
            renderNavigasi();
            loadQuestion(0);
            updateStatistikView();
        }

        // Render Navigasi Tombol Samping (1-10)
        function renderNavigasi() {
            const grid = document.getElementById('grid-navigasi');
            grid.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const btn = document.createElement('button');
                btn.id = `nav-btn-${i}`;
                btn.textContent = i + 1;
                btn.className = getNavBtnClass(i);
                btn.onclick = () => loadQuestion(i);
                grid.appendChild(btn);
            }
        }

        // Menentukan Class Style Tombol Navigasi secara Dinamis
        function getNavBtnClass(index) {
            let base = "h-11 rounded-xl font-bold font-poppins text-sm transition-all duration-200 border flex items-center justify-center ";
            if (index === currentIdx) {
                // Sedang dikerjakan
                return base + "bg-indigo-600 text-white border-indigo-600 shadow-md shadow-indigo-100";
            }
            if (userAnswers[index] === 'correct') {
                return base + "bg-emerald-500 text-white border-emerald-500 shadow-sm shadow-emerald-100";
            }
            if (userAnswers[index] === 'incorrect') {
                return base + "bg-rose-500 text-white border-rose-500 shadow-sm shadow-rose-100";
            }
            // Belum dijawab
            return base + "bg-slate-50 text-slate-500 border-slate-200 hover:bg-slate-100";
        }

        // Memuat Konten Soal Tertentu ke Layout Utama
        function loadQuestion(index) {
            currentIdx = index;
            const q = questionsData[index];
            selectedOption = selectedAnswers[index];

            // Update info atas
            document.getElementById('info-nomor-soal').textContent = `SOAL ${index + 1} DARI 10`;
            document.getElementById('info-topik').textContent = q.topic;
            document.getElementById('teks-pertanyaan').innerHTML = q.question;

            // Render Pilihan Ganda
            const opsiContainer = document.getElementById('container-opsi');
            opsiContainer.innerHTML = '';
            
            q.options.forEach(opt => {
                const isSelected = selectedOption === opt.id;
                const button = document.createElement('button');
                button.className = `w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-center gap-4 ${
                    isSelected 
                    ? 'border-indigo-600 bg-indigo-50/50 text-indigo-900 font-bold' 
                    : 'border-slate-100 hover:border-slate-300 bg-white text-slate-700'
                }`;
                button.disabled = userAnswers[index] !== null; // Kunci jika sudah diperiksa
                button.onclick = () => selectOption(opt.id);

                // Indicator lingkaran/ceklis opsi
                let checkIndicator = `<span class="w-6 h-6 rounded-full border border-slate-300 flex items-center justify-center text-xs text-slate-400 shrink-0 bg-white font-bold font-poppins">${opt.id}</span>`;
                if (isSelected) {
                    checkIndicator = `<span class="w-6 h-6 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xs shrink-0 font-bold font-poppins">${opt.id}</span>`;
                }

                // Jika sudah diperiksa, beri efek warna benar/salah pada opsi
                if (userAnswers[index] !== null) {
                    if (opt.id === q.correct) {
                        button.className = "w-full text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 text-emerald-900 font-bold flex items-center gap-4";
                        checkIndicator = `<span class="w-6 h-6 rounded-full bg-emerald-500 text-white flex items-center justify-center text-xs shrink-0"><i class="fa-solid fa-check"></i></span>`;
                    } else if (isSelected && opt.id !== q.correct) {
                        button.className = "w-full text-left p-4 rounded-xl border-2 border-rose-500 bg-rose-50 text-rose-900 font-bold flex items-center gap-4";
                        checkIndicator = `<span class="w-6 h-6 rounded-full bg-rose-500 text-white flex items-center justify-center text-xs shrink-0"><i class="fa-solid fa-xmark"></i></span>`;
                    }
                }

                button.innerHTML = `
                    ${checkIndicator}
                    <span class="text-sm md:text-base font-poppins">${opt.text}</span>
                `;
                opsiContainer.appendChild(button);
            });

            // Tampilkan/Sembunyikan Pembahasan
            const boxPembahasan = document.getElementById('box-pembahasan');
            const btnPeriksa = document.getElementById('btn-periksa');
            
            if (userAnswers[index] !== null) {
                boxPembahasan.classList.remove('hidden');
                btnPeriksa.classList.add('hidden');
                
                // Set isi pembahasan
                document.getElementById('pembahasan-teks').innerHTML = q.explanation;
                
                const iconBox = document.getElementById('pembahasan-icon');
                const judulBox = document.getElementById('pembahasan-judul');
                
                if (userAnswers[index] === 'correct') {
                    boxPembahasan.className = "bg-emerald-50 border border-emerald-200 rounded-2xl p-6 md:p-8 shadow-sm transition-all duration-300";
                    iconBox.className = "w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-white text-lg shrink-0";
                    iconBox.innerHTML = '<i class="fa-solid fa-face-smile"></i>';
                    judulBox.innerHTML = 'Benar sekali! Bagus! ✨';
                } else {
                    boxPembahasan.className = "bg-rose-50 border border-rose-200 rounded-2xl p-6 md:p-8 shadow-sm transition-all duration-300";
                    iconBox.className = "w-10 h-10 bg-rose-500 rounded-xl flex items-center justify-center text-white text-lg shrink-0";
                    iconBox.innerHTML = '<i class="fa-solid fa-book-open"></i>';
                    judulBox.innerHTML = 'Kurang tepat, mari pelajari caranya:';
                }
            } else {
                boxPembahasan.classList.add('hidden');
                btnPeriksa.classList.remove('hidden');
            }

            renderNavigasi();
        }

        // Event Klik Pada Salah Satu Opsi
        function selectOption(optId) {
            if (userAnswers[currentIdx] !== null) return; // Kunci jika sudah diperiksa
            selectedOption = optId;
            selectedAnswers[currentIdx] = optId;
            loadQuestion(currentIdx);
        }

        // Lewati Soal Tanpa Menjawab
        function lewatiSoal() {
            nextSoal();
        }

        // Verifikasi & Koreksi Jawaban Aktif
        function periksaJawaban() {
            if (!selectedOption) {
                showToast("Silakan pilih salah satu opsi jawaban terlebih dahulu!");
                return;
            }

            const q = questionsData[currentIdx];
            if (selectedOption === q.correct) {
                userAnswers[currentIdx] = 'correct';
            } else {
                userAnswers[currentIdx] = 'incorrect';
            }

            updateStatistikView();
            loadQuestion(currentIdx);
        }

        // Navigasi ke Soal Berikutnya (Muter ke 0 Jika Sudah di Nomor 10)
        function nextSoal() {
            const nextIdx = (currentIdx + 1) % 10;
            loadQuestion(nextIdx);
        }

        // Update Seluruh Statistik di Tampilan secara Real-time
        function updateStatistikView() {
            const countSelesai = userAnswers.filter(ans => ans !== null).length;
            const countBenar = userAnswers.filter(ans => ans === 'correct').length;

            document.getElementById('score-progres').textContent = `${countSelesai}/10`;
            document.getElementById('score-benar').textContent = countBenar;
            document.getElementById('global-badge-score').textContent = `Skor: ${countBenar} / 10`;
        }

        // Custom Toast untuk Notifikasi Cantik (Tidak Menggunakan Browser Alert)
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-5 right-5 bg-slate-900 text-white text-sm px-5 py-3 rounded-xl shadow-lg flex items-center gap-2 z-50 animate-slide-up transition-all";
            toast.innerHTML = `<i class="fa-solid fa-circle-exclamation text-amber-400"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
